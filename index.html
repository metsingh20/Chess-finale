<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- ===================== SEO: PRIMARY ===================== -->
    <title>Chess Lines Practice — Master Your Opening Repertoire</title>
    <meta
      name="description"
      content="Practice chess opening lines and build your repertoire. Import PGN files, drill lines move by move, and track your accuracy. Free chess training tool."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.chesslinespractice.com" />

    <!-- Keywords (minor signal but still useful) -->
    <meta
      name="keywords"
      content="chess opening practice, chess repertoire trainer, chess lines drill, PGN practice tool, free chess training, chess opening drills, chess lines practice"
    />

    <!-- Author -->
    <meta name="author" content="Chess Lines Practice" />

    <!-- ===================== SEO: OPEN GRAPH ===================== -->
    <!-- Used by Facebook, LinkedIn, Discord, Slack previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.chesslinespractice.com" />
    <meta property="og:title" content="Chess Lines Practice — Master Your Opening Repertoire" />
    <meta
      property="og:description"
      content="Drill your chess opening repertoire move by move. Import PGN files, practice lines, and track your accuracy. Free chess training tool."
    />
    <!-- Optional: add an og:image once you have a screenshot/banner -->
    <!-- <meta property="og:image" content="https://www.chesslinespractice.com/og-image.png" /> -->

    <!-- ===================== SEO: TWITTER CARD ===================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chess Lines Practice — Free Opening Repertoire Trainer" />
    <meta
      name="twitter:description"
      content="Import your PGN and drill chess opening lines move by move. Track accuracy across openings and lines. Completely free."
    />
    <!-- <meta name="twitter:image" content="https://www.chesslinespractice.com/og-image.png" /> -->

    <!-- ===================== SEO: STRUCTURED DATA ===================== -->
    <!-- Tells Google exactly what kind of app this is -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Chess Lines Practice",
      "url": "https://www.chesslinespractice.com",
      "description": "A free chess opening repertoire trainer. Practice lines from PGN files, drill move by move, and track your accuracy across openings and individual lines.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Import PGN opening files",
        "Drill chess opening lines move by move",
        "Track accuracy per opening and per line",
        "Analysis board",
        "Progress statistics"
      ],
      "keywords": "chess opening practice, chess repertoire trainer, chess lines drill, PGN practice tool"
    }
    </script>

    <!-- Breadcrumb structured data (helps Google show sub-pages in results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.chesslinespractice.com"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Practice",
          "item": "https://www.chesslinespractice.com/practice"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Analysis",
          "item": "https://www.chesslinespractice.com/analysis"
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Statistics",
          "item": "https://www.chesslinespractice.com/stats"
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
